# Cloud runtime config. Set MCP_COP_URL / MCP_THIEF_URL env vars after deploy.
# Cloud runs must use HTTP/SSE MCP mode; direct mode is local-only.
grid_size: [5, 5]
max_moves: 25
num_games: 6
max_barriers: 5
scoring:
  cop_win: 20
  thief_win: 10
  cop_loss: 5
  thief_loss: 5
start_mode: random
thief_moves_first: true
discount_gamma: 0.95
strategy: heuristic
llm:
  provider: openai
  model: gpt-4o-mini
  timeout_s: 30
  base_url: null
qlearning:
  learning_rate: 0.1
  epsilon: 0.1
mcp:
  mode: http
  auto_launch: false
  # VPS defaults — override with MCP_COP_URL / MCP_THIEF_URL env vars after deploy.
  cop_url: "http://136.112.135.83:8001"
  thief_url: "http://136.112.135.83:8002"
gatekeeper:
  rate_limit_per_target: 3
  max_retries: 4
  queue_size: 64
  timeout_s: 45
